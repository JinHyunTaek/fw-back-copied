global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'spring'
    # Prometheus가 Spring 메트릭 가져갈 URL path
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.36.81:9091' ]

  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      - targets: [ '172.31.36.81:9100' ]

  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: [ '172.31.36.81:9121' ]