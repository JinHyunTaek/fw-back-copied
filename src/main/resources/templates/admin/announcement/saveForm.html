<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Announcement</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-5">

  <h2 class="mb-4">Create Announcement</h2>

  <form th:action="@{/htj-admin/announcement}" th:object="${form}" method="post">

    <div class="mb-3">
      <label class="form-label">Pinned</label>
      <div class="form-check">
        <input type="checkbox"
               class="form-check-input"
               th:field="*{pinned}">
        <label class="form-check-label">상단 고정</label>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Question</label>
      <input type="text"
             class="form-control"
             th:field="*{title}">
      <div class="text-danger"
           th:if="${#fields.hasErrors('title')}"
           th:errors="*{title}">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Content</label>
      <textarea class="form-control"
                rows="6"
                th:field="*{content}">
            </textarea>
      <div class="text-danger"
           th:if="${#fields.hasErrors('content')}"
           th:errors="*{content}">
      </div>
    </div>

    <div class="d-flex justify-content-between">
      <a th:href="@{/htj-admin/announcement/announcements}" class="btn btn-secondary">
        Back
      </a>
      <button type="submit" class="btn btn-primary">
        Save
      </button>
    </div>

  </form>

</div>
</body>
</html>
