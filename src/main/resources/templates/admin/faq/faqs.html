<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FAQ List</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>FAQ List</h2>
                <a th:href="@{/htj-admin/faq/saveForm}" class="btn btn-primary">
                    + New FAQ
                </a>
            </div>

            <table class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Category</th>
                    <th>Question</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="faq : ${faqs}">
                    <td th:text="${faq.id}"></td>
                    <td th:text="${faq.faqCategory}"></td>
                    <td th:text="${faq.question}"></td>
                    <td class="text-end">
                        <a th:href="@{/htj-admin/faq/{id}(id=${faq.id})}"
                           class="btn btn-sm btn-outline-secondary">
                            Detail
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>

</div>
</body>
</html>
