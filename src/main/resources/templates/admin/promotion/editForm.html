<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Promotion</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-4 py-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>🎁 프로모션 수정</h2>
                <a th:href="@{/htj-admin/promotion/{id}(id=${promotionId})}" class="btn btn-secondary">상세</a>
            </div>

            <!-- 기프티콘 이미지 교체 가능 → multipart/form-data -->
            <form th:action="@{/htj-admin/promotion/{id}(id=${promotionId})}"
                  th:object="${form}" method="post" enctype="multipart/form-data">

                <!-- 비즈니스 예외 등 전역 에러 메시지 -->
                <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <!-- ===== 기본 정보 ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header fw-bold">기본 정보</div>
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">제목</label>
                            <input type="text" class="form-control" th:field="*{title}">
                            <div class="text-danger" th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">혜택(보상 안내 문구)</label>
                            <input type="text" class="form-control" th:field="*{benefit}">
                            <div class="text-danger" th:if="${#fields.hasErrors('benefit')}"
                                 th:errors="*{benefit}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label">시작일</label>
                                <input type="date" class="form-control" th:field="*{startDate}">
                                <div class="text-danger" th:if="${#fields.hasErrors('startDate')}"
                                     th:errors="*{startDate}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">종료일</label>
                                <input type="date" class="form-control" th:field="*{endDate}">
                                <div class="text-danger" th:if="${#fields.hasErrors('endDate')}"
                                     th:errors="*{endDate}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">당첨자 발표일</label>
                                <input type="date" class="form-control" th:field="*{announceDate}">
                                <div class="text-danger" th:if="${#fields.hasErrors('announceDate')}"
                                     th:errors="*{announceDate}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">최대 당첨자 수</label>
                            <input type="number" min="1" class="form-control" th:field="*{maxWinnerCount}">
                            <div class="text-danger" th:if="${#fields.hasErrors('maxWinnerCount')}"
                                 th:errors="*{maxWinnerCount}"></div>
                        </div>

                        <div class="mb-1">
                            <label class="form-label">유의사항</label>
                            <textarea class="form-control" rows="4" th:field="*{notice}"></textarea>
                        </div>

                    </div>
                </div>

                <!-- ===== 기프티콘 수정 (미배정 항목만) ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header fw-bold">기프티콘 수정 (미배정 항목)</div>
                    <div class="card-body">

                        <p th:if="${form.gifticons().isEmpty()}" class="text-muted mb-0">
                            수정 가능한 기프티콘이 없습니다.
                        </p>

                        <div th:each="g, stat : *{gifticons}" class="border rounded p-3 mb-3">
                            <input type="hidden" th:field="*{gifticons[__${stat.index}__].id}">
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">상품명</label>
                                    <input type="text" class="form-control"
                                           th:field="*{gifticons[__${stat.index}__].name}">
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('gifticons[__${stat.index}__].name')}"
                                         th:errors="*{gifticons[__${stat.index}__].name}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">쿠폰번호</label>
                                    <input type="text" class="form-control"
                                           th:field="*{gifticons[__${stat.index}__].couponNumber}">
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('gifticons[__${stat.index}__].couponNumber')}"
                                         th:errors="*{gifticons[__${stat.index}__].couponNumber}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">유효기간</label>
                                    <input type="date" class="form-control"
                                           th:field="*{gifticons[__${stat.index}__].expiryDate}">
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('gifticons[__${stat.index}__].expiryDate')}"
                                         th:errors="*{gifticons[__${stat.index}__].expiryDate}"></div>
                                </div>

                                <div class="col-md-8">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select"
                                            th:field="*{gifticons[__${stat.index}__].category}">
                                        <option th:each="c : ${T(my.mma.api.event.promotion.entity.GifticonCategory).values()}"
                                                th:value="${c}" th:text="${c}"></option>
                                    </select>
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('gifticons[__${stat.index}__].category')}"
                                         th:errors="*{gifticons[__${stat.index}__].category}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">순서 <span class="text-muted small">(낮을수록 상위)</span></label>
                                    <input type="number" min="1" class="form-control"
                                           th:field="*{gifticons[__${stat.index}__].displayOrder}">
                                    <div class="text-danger"
                                         th:if="${#fields.hasErrors('gifticons[__${stat.index}__].displayOrder')}"
                                         th:errors="*{gifticons[__${stat.index}__].displayOrder}"></div>
                                </div>

                                <div class="col-12 mt-2">
                                    <label class="form-label">이미지 <span class="text-muted small">(변경 시에만 선택)</span></label>
                                    <div class="d-flex align-items-center gap-3">
                                        <img th:if="${gifticonImageUrls.get(g.id()) != null}"
                                             th:src="${gifticonImageUrls.get(g.id())}" alt="현재 이미지"
                                             class="img-thumbnail" style="max-height: 80px">
                                        <input type="file" class="form-control" accept="image/*"
                                               th:field="*{gifticons[__${stat.index}__].image}">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <p class="text-muted small mb-0">
                            ※ 이미지 교체·기프티콘 추가/삭제는 상세 화면에서 처리합니다.
                        </p>
                    </div>
                </div>

                <!-- ===== 배정 완료 기프티콘 (수정 불가) ===== -->
                <div class="card shadow-sm mb-4" th:unless="${assignedGifticons.isEmpty()}">
                    <div class="card-header fw-bold">배정 완료 기프티콘 (수정 불가)</div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <thead class="table-dark">
                            <tr>
                                <th>상품명</th>
                                <th>쿠폰번호</th>
                                <th>유효기간</th>
                                <th>이미지</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="g : ${assignedGifticons}">
                                <td th:text="${g.name()}"></td>
                                <td th:text="${g.couponNumber()}"></td>
                                <td th:text="${#temporals.format(g.expiryDate(), 'yyyy-MM-dd')}"></td>
                                <td>
                                    <img th:if="${g.imageUrl()}" th:src="${g.imageUrl()}" alt="기프티콘 이미지"
                                         class="img-thumbnail" style="max-height: 60px">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/htj-admin/promotion/{id}(id=${promotionId})}" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">수정</button>
                </div>

            </form>

        </main>
    </div>
</div>

</body>
</html>
