<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <meta charset="UTF-8">
    <title>앱 버전 관리</title>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <h3 class="mb-4">앱 버전 관리</h3>
            <!-- 현재 상태 카드 -->
            <div class="card mb-4">
                <div class="card-header">
                    현재 설정
                </div>
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-sm-3 fw-bold">최소 버전</div>
                        <div class="col-sm-9" th:text="${appStatus.minVersion}"></div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-sm-3 fw-bold">최신 버전</div>
                        <div class="col-sm-9" th:text="${appStatus.latestVersion}"></div>
                    </div>
                </div>
            </div>

            <!-- 수정 폼 -->
            <div class="card">
                <div class="card-header">
                    설정 변경
                </div>

                <div class="card-body">
                    <form th:action="@{/htj-admin/system/app-status}"
                          th:object="${form}"
                          method="post">

                        <!-- 최소 버전 -->
                        <div class="mb-3">
                            <label class="form-label">최소 버전</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{minVersion}"
                                   placeholder="예: 1.2.0">

                            <div class="text-danger mt-1"
                                 th:errors="*{minVersion}">
                            </div>
                        </div>

                        <!-- 최신 버전 -->
                        <div class="mb-3">
                            <label class="form-label">최신 버전</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{latestVersion}"
                                   placeholder="예: 1.3.0">

                            <div class="text-danger mt-1"
                                 th:errors="*{latestVersion}">
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-primary">
                            저장
                        </button>

                    </form>
                </div>
            </div>
        </main>
    </div>

</div>

</body>
</html>
