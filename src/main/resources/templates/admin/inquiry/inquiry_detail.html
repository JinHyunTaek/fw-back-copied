<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>문의 상세</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>
        <div class="col-md-10 py-4">
            <h3 class="mb-4">📩 문의 상세</h3>

            <!-- 문의 정보 카드 -->
            <div class="card mb-4">
                <div class="card-body">

                    <div class="row mb-2">
                        <div class="col-md-2 fw-bold">작성자</div>
                        <div class="col-md-10"
                             th:text="${inquiry.nickname()}">
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-md-2 fw-bold">카테고리</div>
                        <div class="col-md-10"
                             th:text="${inquiry.category.getDescription()}">
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-md-2 fw-bold">작성일</div>
                        <div class="col-md-10 text-muted"
                             th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm')}">
                        </div>
                    </div>

                    <hr/>

                    <div class="mb-2 fw-bold">문의 내용</div>
                    <div class="border rounded p-3 bg-light"
                         style="white-space: pre-wrap;"
                         th:text="${inquiry.content}">
                    </div>

                </div>
            </div>

            <!-- 답변 작성 -->
            <div class="card">
                <div class="card-body">

                    <h5 class="mb-3">✍️ 관리자 답변</h5>

                    <form th:action="@{/htj-admin/inquiry}"
                          method="post" th:object="${form}">

                        <!-- AdminInquiryAnswerRequest.id -->
                        <input type="hidden" name="id"
                               th:value="${inquiry.id()}" />

                        <div class="mb-3">
                    <textarea class="form-control"
                              th:field="*{answer}"
                              rows="6"
                              placeholder="답변 내용을 입력하세요"
                              required>
                    </textarea>
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('answer')}"
                                 th:errors="*{answer}" style="font-size: 15px">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/htj-admin/inquiry/all}"
                               class="btn btn-secondary">
                                목록
                            </a>

                            <button type="submit"
                                    class="btn btn-primary">
                                답변 등록
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
