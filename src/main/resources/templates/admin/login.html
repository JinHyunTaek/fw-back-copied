<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 간단한 스타일 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #ffffff;
            padding: 40px;
            width: 360px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #111827;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #1d4ed8;
        }

        .error-message {
            margin-top: 15px;
            color: #dc2626;
            text-align: center;
            font-size: 14px;
        }
        .field-error {
            border-color: #dc3545;
            color: #dc3545;
        }
    </style>
</head>

<body>
<div class="login-box">
    <h2>관리자 로그인</h2>
    <form th:action="@{/htj-admin/login}" th:object="${user}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p class="field-error" th:each="error : ${#fields.globalErrors()}"
               th:text="${error}">전체 오류 메시지</p>
        </div>
        <div class="form-group">
            <label for="email">아이디</label>
            <input type="text" id="email" name="email" placeholder="admin id" required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="password" required>
        </div>

        <button type="submit" class="login-btn">로그인</button>

        <!-- 로그인 실패 메시지 -->
        <div class="error-message" th:if="${error}">
            <p th:text="${error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        </div>
    </form>
</div>
</body>
</html>
