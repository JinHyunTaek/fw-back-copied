<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>page Management</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        .table th, .table td {
            vertical-align: middle;
        }

        .pagination {
            justify-content: center;
        }

        .headshot {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <!-- Search -->
            <form method="get" th:action="@{/htj-admin/user/users}" class="row g-2 mb-3">
                <div class="col-auto">
                    <input type="text" name="nickname" class="form-control" placeholder="Search by nickname"
                           th:value="${param.name}"/>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>

            <!-- page Table -->
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                <tr>
                    <th>PK</th>
                    <th>닉네임</th>
                    <th>이메일</th>
                </tr>
                </thead>
                <tr th:each="user : ${page.content}"
                    th:onclick="|location.href='@{/htj-admin/user/{id}(id=${user.id})}'|"
                    style="cursor: pointer;">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.nickname}"></td>
                    <td th:text="${user.email}"></td>
                </tr>
                <tr th:if="${page.totalElements == 0}">
                    <td colspan="5" class="text-center">No page found</td>
                </tr>
                </tbody>
            </table>

            <!-- 페이징 -->
            <nav class="mt-4" th:if="${page.totalPages > 1}">
                <ul class="pagination justify-content-center">

                    <li class="page-item"
                        th:classappend="${page.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/htj-admin/user/users(page=${page.number - 1}, name=${name})}">
                            이전
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="pageNum : ${#numbers.sequence((page.number / 10) * 10,
        T(java.lang.Math).min((page.number / 10) * 10 + 9, page.totalPages - 1))}"
                        th:classappend="${pageNum == page.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/htj-admin/user/users(page=${pageNum}, name=${name})}"
                           th:text="${pageNum + 1}">
                        </a>
                    </li>

                    <li class="page-item"
                        th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/htj-admin/user/users(page=${page.number + 1}, name=${name})}">
                            다음
                        </a>
                    </li>

                </ul>
            </nav>
        </main>
    </div>

</div>
</body>
</html>
