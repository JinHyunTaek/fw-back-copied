<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Domain Sync</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>
<div class="container-fluid">
    <div class="row">

        <!-- 사이드바 -->
        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <main class="col-md-10 px-5 py-4">

            <!-- 타이틀 -->
            <div class="mb-4">
                <h2 class="fw-bold">⚙️ 관리자 동기화 패널</h2>
                <p class="text-muted">
                    메인 도메인(Fighters, Events)의 최신 데이터를 수동으로 동기화합니다.
                    <br/>
                    ※ 트래픽이 발생할 수 있으니 필요할 때만 실행하세요.
                </p>
            </div>

            <!-- 버튼 카드 영역 -->
            <div class="row g-4 mt-3">

                <!-- Fighters Sync -->
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column justify-content-between">

                            <div>
                                <h4 class="card-title">🥊 파이터 랭킹 동기화</h4>
                                <p class="card-text text-muted">
                                    파이터 랭킹을
                                    최신 상태로 갱신합니다.
                                </p>
                            </div>

                            <form th:action="@{/htj-admin/fighter/update_ranking}" method="post">
                                <button type="submit"
                                        class="btn btn-danger btn-lg w-100 mt-3">
                                    파이터 랭킹 최신 동기화 실행
                                </button>
                            </form>

                        </div>
                    </div>
                </div>

                <!-- Events Sync -->
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column justify-content-between">

                            <div>
                                <h4 class="card-title">📅 경기 일정 동기화</h4>
                                <p class="card-text text-muted">
                                    예정 / 진행 / 종료된 경기 이벤트 정보를
                                    최신 상태로 갱신합니다.
                                </p>
                            </div>

                            <form th:action="@{/htj-admin/event/save_upcoming}" method="post">
                                <button type="submit"
                                        class="btn btn-warning btn-lg w-100 mt-3">
                                    경기 일정 최신 동기화 실행
                                </button>
                            </form>

                        </div>
                    </div>
                    <div class="mt-2 text-center small">
                        <span th:if="${prePollingTime != null}" class="text-success fw-semibold">
                            ✅ 자동 폴링 예약됨: <span th:text="${prePollingTime}"></span> (KST)
                        </span>
                        <span th:if="${prePollingTime == null}" class="text-danger fw-semibold">
                            ⚠️ 자동 폴링 미등록
                        </span>
                    </div>
                </div>

                <!-- Handle Unsettled Bets -->
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column justify-content-between">

                            <div>
                                <h4 class="card-title">정산 안 된 배팅 재정산</h4>
                                <p class="card-text text-muted">
                                    정산되지 않은 모든 배팅을 재정산합니다.
                                </p>
                            </div>

                            <form th:action="@{/htj-admin/unsettled-bet}" method="post">
                                <button type="submit"
                                        class="btn btn-warning btn-lg w-100 mt-3">
                                    배팅 재정산 실행
                                </button>
                            </form>

                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>
</div>
</body>
</html>
