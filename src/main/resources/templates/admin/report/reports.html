<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <style>
        .pagination {
            display: flex;
            list-style: none;
            gap: 6px;
            padding: 0;
        }

        .pagination li a {
            padding: 6px 12px;
            border: 1px solid #ddd;
            text-decoration: none;
            color: #333;
            border-radius: 4px;
        }

        .pagination li.active a {
            background-color: #222;
            color: #fff;
            border-color: #222;
        }

        .pagination li.disabled a {
            pointer-events: none;
            color: #aaa;
            border-color: #eee;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- 사이드바 -->
        <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
            <div th:replace="~{admin/fragment/sidebar}"></div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <main class="col-md-10 ms-sm-auto px-4 py-4">

            <h2 class="mb-4">🚨 신고 내역</h2>

            <div class="card shadow-sm">
                <div class="card-body p-0">

                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>피신고자 ID</th>
                            <th>피신고자 닉네임</th>
                            <th>주요 사유</th>
                            <th>신고 횟수</th>
                            <th>메시지</th>
                            <th>신고일</th>
                            <th style="width: 260px;">관리</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="report : ${reports.content}">
                            <td th:text="${report.reportedUserId()}"></td>
                            <td th:text="${report.reportedUserNickname()}"></td>

                            <td>
                                <span class="badge bg-danger"
                                      th:text="${report.reportCategory().getDescription()}"></span>
                            </td>
                            <td th:text="${report.reportedCount()}"></td>
                            <td th:text="${report.messageSnapshot()}"></td>
                            <td th:text="${#temporals.format(report.reportedDate(), 'yyyy-MM-dd')}"></td>

                            <!-- 🔥 여기 핵심 -->
                            <td>
                                <form th:action="@{/htj-admin/report}"
                                      method="post"
                                      class="d-flex gap-2 align-items-center">

                                    <input type="hidden"
                                           name="messageId"
                                           th:value="${report.id()}"/>

                                    <select name="category"
                                            class="form-select form-select-sm">
                                        <option value="">-- 선택 --</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c}"
                                                th:text="${c.getDescription()}">
                                        </option>
                                    </select>

                                    <button class="btn btn-sm btn-danger">
                                        활성화
                                    </button>
                                </form>

                                <form th:action="@{/htj-admin/report}"
                                      method="post">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <input type="hidden"
                                           name="messageId"
                                           th:value="${report.id()}"/>
                                    <button class="btn btn-sm btn-secondary">
                                        기각
                                    </button>
                                </form>
                            </td>
                        </tr>

                        <tr th:if="${reports.content.isEmpty()}">
                            <td colspan="7" class="text-center py-4 text-muted">
                                신고 내역이 없습니다.
                            </td>
                        </tr>

                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이징 -->
            <nav class="mt-4" th:if="${reports.totalPages > 1}">
                <ul class="pagination justify-content-center">

                    <li class="page-item"
                        th:classappend="${reports.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/htj-admin/report/all(page=${reports.number - 1}, size=${reports.size})}">
                            이전
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="pageNum : ${#numbers.sequence(0, reports.totalPages - 1)}"
                        th:classappend="${pageNum == reports.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/htj-admin/report/all(page=${pageNum}, size=${reports.size})}"
                           th:text="${pageNum + 1}">
                        </a>
                    </li>

                    <li class="page-item"
                        th:classappend="${reports.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/htj-admin/report/all(page=${reports.number + 1}, size=${reports.size})}">
                            다음
                        </a>
                    </li>

                </ul>
            </nav>

        </main>
    </div>
</div>

</body>
</html>
