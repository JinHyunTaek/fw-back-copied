<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>에러 발생</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .error-container {
      min-height: 100vh;
    }
    .error-code {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .error-status {
      font-size: 3rem;
      font-weight: 700;
    }
    .error-message {
      font-size: 1.1rem;
      color: #555;
    }
  </style>
</head>

<body>
<div class="container error-container d-flex justify-content-center align-items-center">
  <div class="card shadow-sm p-4" style="max-width: 520px; width: 100%;">
    <div class="card-body text-center">

      <!-- 상태 코드 -->
      <div class="error-status text-danger"
           th:text="${statusCode}">
        500
      </div>

      <!-- 에러 코드 -->
      <div class="error-code text-muted mt-2"
           th:text="${errorCode}">
        INTERNAL_ERROR
      </div>

      <hr class="my-4">

      <!-- 메시지 -->
      <p class="error-message"
         th:text="${message}">
        알 수 없는 오류가 발생했습니다.
      </p>

      <div class="d-flex justify-content-center gap-2 mt-4">
        <a th:href="@{/htj-admin/dashboard}" class="btn btn-primary">
          대시보드로
        </a>
        <a th:href="@{/htj-admin/login}" class="btn btn-outline-secondary">
          로그인 페이지
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
