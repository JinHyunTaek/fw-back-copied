<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stream Fight Event 편집</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        .sidebar { min-height: 100vh; background-color: #1f2937; }
        .canceled-row { opacity: 0.5; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block bg-dark min-vh-100">
        <div th:replace="~{admin/fragment/sidebar}"></div>
    </nav>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-4">🎬 Stream Fight Event 편집</h4>

        <!-- 이벤트 선택 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">이벤트 선택 (Upcoming)</div>
            <div class="card-body d-flex gap-2 align-items-center flex-wrap">
                <th:block th:each="e : ${upcomingEvents}">
                    <a th:href="@{/htj-admin/stream/event/{id}(id=${e.id})}"
                       class="btn btn-sm"
                       th:classappend="${e.id == event.id} ? 'btn-dark' : 'btn-outline-dark'"
                       th:text="${e.name}"></a>
                </th:block>
            </div>
        </div>

        <!-- 이벤트 기본 정보 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white">이벤트 정보 수정</div>
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">이벤트명</label>
                        <input id="eventName" type="text" class="form-control" th:value="${event.name}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Display Date</label>
                        <input id="displayDate" type="date" class="form-control"
                               th:value="${event.displayDate != null ? #temporals.format(event.displayDate, 'yyyy-MM-dd') : ''}">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-2">
                        <label class="form-label">Early Card 날짜</label>
                        <input id="earlyCardDate" type="date" class="form-control"
                               th:value="${event.earlyCardDateTimeInfo != null ? #temporals.format(event.earlyCardDateTimeInfo.date, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Early Card 시간</label>
                        <input id="earlyCardTime" type="time" class="form-control"
                               th:value="${event.earlyCardDateTimeInfo != null ? #temporals.format(event.earlyCardDateTimeInfo.time, 'HH:mm') : ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Prelim Card 날짜</label>
                        <input id="prelimCardDate" type="date" class="form-control"
                               th:value="${event.prelimCardDateTimeInfo != null ? #temporals.format(event.prelimCardDateTimeInfo.date, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Prelim Card 시간</label>
                        <input id="prelimCardTime" type="time" class="form-control"
                               th:value="${event.prelimCardDateTimeInfo != null ? #temporals.format(event.prelimCardDateTimeInfo.time, 'HH:mm') : ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Main Card 날짜</label>
                        <input id="mainCardDate" type="date" class="form-control"
                               th:value="${event.mainCardDateTimeInfo != null ? #temporals.format(event.mainCardDateTimeInfo.date, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Main Card 시간</label>
                        <input id="mainCardTime" type="time" class="form-control"
                               th:value="${event.mainCardDateTimeInfo != null ? #temporals.format(event.mainCardDateTimeInfo.time, 'HH:mm') : ''}">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-2">
                        <label class="form-label">Early Card 수</label>
                        <input id="earlyCardCnt" type="number" class="form-control" min="0"
                               th:value="${event.earlyCardCnt}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Prelim Card 수</label>
                        <input id="prelimCardCnt" type="number" class="form-control" min="0"
                               th:value="${event.prelimCardCnt}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Main Card 수</label>
                        <input id="mainCardCnt" type="number" class="form-control" min="0"
                               th:value="${event.mainCardCnt}">
                    </div>
                </div>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-primary" onclick="saveEventInfo()">저장 (Redis 반영)</button>
                </div>
            </div>
        </div>

        <!-- FFE 목록 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span>대전 카드 목록</span>
                <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addFfeModal">+ FFE 추가</button>
            </div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0">
                    <thead class="table-secondary">
                    <tr>
                        <th>순서</th>
                        <th>파이터 1 (Winner slot)</th>
                        <th>파이터 2 (Loser slot)</th>
                        <th>체급</th>
                        <th>타이틀전</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                    </thead>
                    <tbody id="ffeTableBody">
                    <tr th:each="ffe : ${event.fighterFightEvents}"
                        th:classappend="${ffe.isCanceled()} ? 'canceled-row'"
                        th:data-ffe-id="${ffe.id}">
                        <td>
                            <input type="number" class="form-control form-control-sm order-input"
                                   th:value="${ffe.cardOrder}" style="width:60px" min="1">
                        </td>
                        <td th:text="${ffe.winner.name + ' (' + (ffe.winner.koreanName ?: '-') + ')'}"></td>
                        <td th:text="${ffe.loser.name + ' (' + (ffe.loser.koreanName ?: '-') + ')'}"></td>
                        <td>
                            <select class="form-select form-select-sm fwe-input" style="min-width:160px">
                                <option value="">선택</option>
                                <option th:each="fw : ${T(my.mma.api.fightevent.entity.property.FightWeight).values()}"
                                        th:value="${fw.displayName}"
                                        th:text="${fw.displayName}"
                                        th:selected="${ffe.fightWeight != null and ffe.fightWeight == fw}">
                                </option>
                            </select>
                        </td>
                        <td class="text-center">
                            <input type="checkbox" class="title-check" th:checked="${ffe.isTitle()}">
                        </td>
                        <td>
                            <span th:if="${!ffe.isCanceled()}" class="badge bg-success">Active</span>
                            <span th:if="${ffe.isCanceled()}" class="badge bg-secondary">Canceled</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <button th:if="${!ffe.isCanceled()}"
                                        class="btn btn-sm btn-outline-primary"
                                        th:onclick="'updateFfe(' + ${ffe.id} + ', this)'">수정</button>
                                <button th:if="${!ffe.isCanceled()}"
                                        class="btn btn-sm btn-outline-danger"
                                        th:onclick="'cancelFfe(' + ${ffe.id} + ', this)'">취소</button>
                                <button th:if="${ffe.isCanceled()}"
                                        class="btn btn-sm btn-outline-success"
                                        th:onclick="'reactivateFfe(' + ${ffe.id} + ', this)'">재활성화</button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add FFE Modal -->
<div class="modal fade" id="addFfeModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">FFE 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Fighter 1 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">파이터 1 (Winner slot)</label>
                    <div class="input-group">
                        <input id="winner-search" type="text" class="form-control" placeholder="이름 검색...">
                        <button class="btn btn-outline-secondary" onclick="searchFighter('winner')">검색</button>
                    </div>
                    <div id="winner-results" class="list-group mt-1"></div>
                    <input type="hidden" id="winner-id">
                    <div id="winner-selected" class="text-success mt-1 small"></div>
                </div>
                <!-- Fighter 2 -->
                <div class="mb-3">
                    <label class="form-label fw-bold">파이터 2 (Loser slot)</label>
                    <div class="input-group">
                        <input id="loser-search" type="text" class="form-control" placeholder="이름 검색...">
                        <button class="btn btn-outline-secondary" onclick="searchFighter('loser')">검색</button>
                    </div>
                    <div id="loser-results" class="list-group mt-1"></div>
                    <input type="hidden" id="loser-id">
                    <div id="loser-selected" class="text-success mt-1 small"></div>
                </div>
                <!-- Details -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">체급</label>
                        <select id="new-fwe" class="form-select">
                            <option value="">선택</option>
                            <option th:each="fw : ${T(my.mma.api.fightevent.entity.property.FightWeight).values()}"
                                    th:value="${fw.displayName}"
                                    th:text="${fw.displayName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">순서</label>
                        <input type="number" id="new-order" class="form-control" min="1" value="1">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="new-title">
                            <label class="form-check-label" for="new-title">타이틀전</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button class="btn btn-primary" onclick="submitAddFfe()">추가</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const eventId = [[${event.id}]];

    function saveEventInfo() {
        const body = {
            // document.getElementById('...').value || null : 빈 문자열 → null 변환
            name: document.getElementById('eventName').value,
            displayDate: document.getElementById('displayDate').value || null,
            earlyCardDate: document.getElementById('earlyCardDate').value || null,
            earlyCardTime: document.getElementById('earlyCardTime').value || null,
            prelimCardDate: document.getElementById('prelimCardDate').value || null,
            prelimCardTime: document.getElementById('prelimCardTime').value || null,
            mainCardDate: document.getElementById('mainCardDate').value || null,
            mainCardTime: document.getElementById('mainCardTime').value || null,
            earlyCardCnt: document.getElementById('earlyCardCnt').value ? parseInt(document.getElementById('earlyCardCnt').value) : null,
            prelimCardCnt: document.getElementById('prelimCardCnt').value ? parseInt(document.getElementById('prelimCardCnt').value) : null,
            mainCardCnt: document.getElementById('mainCardCnt').value ? parseInt(document.getElementById('mainCardCnt').value) : null,
        };
        fetch(`/htj-admin/stream/event/${eventId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(res => {
            if (res.ok) alert('저장 완료 (Redis 반영됨)');
            else alert('저장 실패');
        });
    }

    function updateFfe(ffeId, btn) {
        const row = btn.closest('tr');
        const fightWeight = row.querySelector('.fwe-input').value;
        const title = row.querySelector('.title-check').checked;
        const cardOrder = parseInt(row.querySelector('.order-input').value);
        fetch(`/htj-admin/stream/event/ffe/${ffeId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({fightWeight, title, cardOrder})
        }).then(res => {
            if (res.ok) alert('수정 완료');
            else alert('수정 실패');
        });
    }

    function cancelFfe(ffeId, btn) {
        if (!confirm('이 카드를 취소 상태로 변경할까요?')) return;
        fetch(`/htj-admin/stream/event/ffe/${ffeId}`, {method: 'DELETE'})
            .then(res => { if (res.ok) location.reload(); else alert('실패'); });
    }

    function reactivateFfe(ffeId, btn) {
        fetch(`/htj-admin/stream/event/ffe/${ffeId}/reactivate`, {method: 'PATCH'})
            .then(res => { if (res.ok) location.reload(); else alert('실패'); });
    }

    function searchFighter(slot) {
        const query = document.getElementById(`${slot}-search`).value;
        fetch(`/htj-admin/fighter/search?name=${encodeURIComponent(query)}&size=10`)
            .then(r => r.json())
            .then(data => {
                const results = document.getElementById(`${slot}-results`);
                results.innerHTML = '';
                data.content.forEach(f => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action';
                    item.textContent = `${f.name} (${f.koreanName ?? '-'})`;
                    item.onclick = () => {
                        document.getElementById(`${slot}-id`).value = f.id;
                        document.getElementById(`${slot}-selected`).textContent = `선택됨: ${f.name} (${f.koreanName ?? '-'})`;
                        results.innerHTML = '';
                    };
                    results.appendChild(item);
                });
            });
    }

    // 엔터키 검색 지원
    ['winner-search', 'loser-search'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
            if (e.key === 'Enter') searchFighter(id.replace('-search', ''));
        });
    });

    function submitAddFfe() {
        const winnerId = document.getElementById('winner-id').value;
        const loserId = document.getElementById('loser-id').value;
        if (!winnerId || !loserId) { alert('파이터 두 명을 모두 선택해주세요.'); return; }
        const body = {
            winnerId: parseInt(winnerId),
            loserId: parseInt(loserId),
            fightWeight: document.getElementById('new-fwe').value,
            title: document.getElementById('new-title').checked,
            cardOrder: parseInt(document.getElementById('new-order').value)
        };
        fetch(`/htj-admin/stream/event/${eventId}/ffe`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(res => { if (res.ok) location.reload(); else alert('추가 실패'); });
    }
</script>
</body>
</html>
