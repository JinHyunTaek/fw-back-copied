<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>fightweek LLM 테스트</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
        h1 { font-size: 20px; }
        .row { display: flex; gap: 8px; margin-bottom: 16px; }
        #question { flex: 1; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 18px; font-size: 15px; border: 0; border-radius: 6px; background: #d20a0a; color: #fff; cursor: pointer; }
        button:disabled { background: #999; cursor: not-allowed; }
        #status { font-size: 13px; color: #666; margin-bottom: 8px; min-height: 18px; }
        #output { white-space: pre-wrap; line-height: 1.6; border: 1px solid #eee; border-radius: 8px; padding: 16px; min-height: 120px; background: #fafafa; }
        .err { color: #d20a0a; }
        .examples { margin-top: 20px; font-size: 13px; color: #888; }
        .examples span { cursor: pointer; text-decoration: underline; margin-right: 12px; }
    </style>
</head>
<body>
    <h1>🥊 fightweek LLM 챗봇 테스트</h1>

    <div class="row">
        <select id="category">
            <option value="event">event (카드 전체)</option>
            <option value="fight">fight (A vs B)</option>
            <option value="fighter">fighter (선수 리포트)</option>
        </select>
        <input type="text" id="fighterId" placeholder="fighterId (fighter일 때)" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:6px;">
        <input type="text" id="fightId" placeholder="fightId (경기 단위 질문일 때)" style="flex:1; padding:10px; border:1px solid #ccc; border-radius:6px;">
    </div>

    <div class="row">
        <input type="text" id="question" placeholder="AiQuestion enum 값 (예: PREDICT_WINNER)" autofocus>
        <button id="sendBtn" onclick="ask()">전송</button>
    </div>

    <div id="status"></div>
    <div id="output"></div>

    <div class="examples">
        예시(enum):
        <span onclick="fill(this)">MOST_ANTICIPATED</span>
        <span onclick="fill(this)">PREDICT_WINNER</span>
        <span onclick="fill(this)">SCOUTING_REPORT</span>
        <span style="cursor:default; text-decoration:none;">— 메뉴 전체: <a href="/stream/ai/questions" target="_blank">/stream/ai/questions</a></span>
    </div>

    <script>
        let es = null;
        const $q = document.getElementById('question');
        const $out = document.getElementById('output');
        const $status = document.getElementById('status');
        const $btn = document.getElementById('sendBtn');

        function fill(el) { $q.value = el.textContent; $q.focus(); }

        function setBusy(busy) {
            $btn.disabled = busy;
            $btn.textContent = busy ? '응답 중...' : '전송';
        }

        function ask() {
            const q = $q.value.trim();
            if (!q) return;

            // 이전 연결 정리
            if (es) es.close();

            $out.textContent = '';
            $out.classList.remove('err');
            $status.textContent = '⏳ 모델 응답 대기 중...';
            setBusy(true);

            // question: AiQuestion enum 값(예: PREDICT_WINNER). 실제 Flutter 앱은 /ai/questions 메뉴에서 선택.
            const category = document.getElementById('category').value;
            let url = '/stream/ai/' + category + '?question=' + encodeURIComponent(q);
            if (category === 'fighter') {
                const fighterId = document.getElementById('fighterId').value.trim();
                url += '&fighterId=' + encodeURIComponent(fighterId);
            } else if (category === 'fight') {
                const fightId = document.getElementById('fightId').value.trim();
                if (fightId) url += '&fightId=' + encodeURIComponent(fightId);
            }

            es = new EventSource(url);

            // 토큰 조각 도착 → 화면에 누적
            es.addEventListener('token', e => {
                const data = JSON.parse(e.data);
                $out.textContent += data.answer;
                $status.textContent = '✍️ 응답 생성 중...';
            });

            // 정상 종료
            es.addEventListener('done', e => {
                $status.textContent = '✅ 완료';
                setBusy(false);
                es.close();
            });

            // 서버가 보낸 애플리케이션 에러 (data 있음)
            es.addEventListener('error', e => {
                if (e.data) {
                    const data = JSON.parse(e.data);
                    $out.textContent += '\n[에러] ' + data.answer;
                    $out.classList.add('err');
                    $status.textContent = '❌ 오류';
                } else {
                    // data 없는 error = 연결 끊김/네트워크 (done 이후 자동재연결 시도 등)
                    $status.textContent = $status.textContent.startsWith('✅') ? '✅ 완료' : '❌ 연결 종료';
                }
                setBusy(false);
                es.close();
            });
        }

        $q.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
    </script>
</body>
</html>
