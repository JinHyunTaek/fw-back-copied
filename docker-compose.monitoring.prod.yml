services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    # (정상/비정상 종료 불문) 항상 재시작 (ex) host reboot -> docker demon init -> nginx start)
    restart: always
    networks:
      - internal

  Prometheus:
    image: prom/prometheus:latest
    container_name: prom-prod
    expose:
      - 9090
    volumes:
      - ./prometheus/prometheus-prod.yml:/etc/prometheus/prometheus.yml
      - ./prom-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=/htj-prometheus/'
      - '--web.route-prefix=/'
    restart: always
    networks:
      - internal

  Grafana:
    image: grafana/grafana:latest
    container_name: grafana-local
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://fightweek.kr/htj-grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./grafana-data:/var/lib/grafana
    restart: always
    networks:
      - internal

  flask-app:
    image: ${FLASK_ECR_IMAGE}
    container_name: flask-container
    ports:
      - "5000:5000"

networks:
  internal:
    driver: bridge