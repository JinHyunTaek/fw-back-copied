name: deploy-ec2-prod

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: make application prod yml  # application-prod.yml 생성
        run: |
          cd ./src/main/resources
          touch ./application-prod.yml
          echo "${{ secrets.APPLICATION_PROD_YML }}" > ./application-prod.yml

      - name: make application yml  # application.yml 생성
        run: |
          cd ./src/main/resources
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML }}" > ./application.yml

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      # ECR 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ECR_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Docker build & push
      - name: Build and Push Docker Image
        run: |
          docker build -t mma-server .
          docker tag mma-server:latest 648232846728.dkr.ecr.ap-northeast-2.amazonaws.com/mma-server:latest
          docker push 648232846728.dkr.ecr.ap-northeast-2.amazonaws.com/mma-server:latest

      # EC2 접속해서 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3 # EC2로 SSH 접속
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mma-server
            ./deploy-spring.sh
